<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathsPro — Lycée Professionnel</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#e8f4fd; --bg2:#d0e8f8; --surf:#ffffff; --surf2:#f0f8ff;
  --border:#b0cfe8; --text:#1a2d42; --muted:#5a7a9a;
  --sh:0 2px 12px rgba(30,90,160,.10); --sh2:0 6px 28px rgba(30,90,160,.16);
  --cap:#059669; --capd:#047857; --capl:#d1fae5; --capt:rgba(5,150,105,.15);
  --sec:#2563eb; --secd:#1d4ed8; --secl:#dbeafe; --sect:rgba(37,99,235,.15);
  --pre:#d97706; --pred:#b45309; --prel:#fef3c7; --pret:rgba(217,119,6,.15);
  --ter:#7c3aed; --terd:#6d28d9; --terl:#ede9fe; --tert:rgba(124,58,237,.15);
  --r:14px; --rs:9px;
  --f:'Nunito',sans-serif; --mono:'Fira Code',monospace;
}
.dark {
  --bg:#0d1b2a; --bg2:#122235; --surf:#162d42; --surf2:#1a3450;
  --border:#1e3d5c; --text:#d8eaf7; --muted:#6a90b0;
  --sh:0 2px 12px rgba(0,0,0,.4); --sh2:0 6px 28px rgba(0,0,0,.5);
  --capl:rgba(5,150,105,.18); --secl:rgba(37,99,235,.18);
  --prel:rgba(217,119,6,.18); --terl:rgba(124,58,237,.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--f);background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6;transition:background .25s,color .25s;overflow-x:hidden}
body.dark{background:linear-gradient(150deg,#0d1b2a 0%,#091520 100%)}

/* ── TOPBAR ── */
#bar{position:fixed;top:0;left:0;right:0;z-index:200;
  background:rgba(255,255,255,.93);backdrop-filter:blur(18px);
  border-bottom:1.5px solid var(--border);
  display:flex;align-items:center;gap:12px;padding:10px 24px;
  box-shadow:0 2px 10px rgba(30,90,160,.07);transition:background .25s}
.dark #bar{background:rgba(13,27,42,.93)}
.logo{font-family:var(--f);font-size:1.22rem;font-weight:900;color:var(--sec);
  white-space:nowrap;display:flex;align-items:center;gap:7px;letter-spacing:-.01em}
#sw{flex:1;max-width:350px;position:relative}
#si{width:100%;padding:8px 14px 8px 35px;border:1.5px solid var(--border);border-radius:30px;
  font-family:var(--f);font-size:.88rem;font-weight:500;
  background:var(--surf);color:var(--text);outline:none;transition:border .2s,box-shadow .2s}
#si:focus{border-color:var(--sec);box-shadow:0 0 0 3px var(--sect)}
#si::placeholder{color:var(--muted);font-weight:400}
.sico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:.9rem}
#sr{position:absolute;top:calc(100% + 5px);left:0;right:0;background:var(--surf);border-radius:var(--rs);
  border:1.5px solid var(--border);display:none;z-index:400;max-height:270px;overflow-y:auto;box-shadow:var(--sh2)}
.sri{padding:9px 14px;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sri:hover{background:var(--bg2)}
.sri-b{font-size:.68rem;font-weight:800;padding:2px 7px;border-radius:20px;white-space:nowrap}
.bar-r{display:flex;align-items:center;gap:8px;margin-left:auto}
.bbtn{display:flex;align-items:center;gap:5px;padding:7px 14px;border-radius:30px;
  border:1.5px solid var(--border);background:transparent;
  font-family:var(--f);font-size:.82rem;font-weight:700;color:var(--text);cursor:pointer;white-space:nowrap;transition:all .2s}
.bbtn:hover{background:var(--secl);border-color:var(--sec);color:var(--sec)}
#tbtn{padding:7px 11px}

/* ── MAIN ── */
main{margin-top:66px;padding:28px 22px;max-width:1100px;margin-left:auto;margin-right:auto}
.page{display:none;animation:fadeUp .3s ease}
.page.on{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ── HOME ── */
.hero{text-align:center;padding:46px 20px 34px}
.eyebrow{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:800;
  letter-spacing:.09em;text-transform:uppercase;color:var(--sec);background:var(--secl);
  border:1.5px solid rgba(37,99,235,.3);border-radius:30px;padding:5px 14px;margin-bottom:16px}
.hero h1{font-size:clamp(1.9rem,5vw,3.2rem);font-weight:900;line-height:1.12;
  letter-spacing:-.025em;margin-bottom:10px;color:var(--text)}
.hero h1 .ac{color:var(--sec)}
.hero p{font-size:.97rem;color:var(--muted);max-width:490px;margin:0 auto 32px}
.srow{display:flex;gap:13px;justify-content:center;flex-wrap:wrap;margin-bottom:38px}
.sbox{background:var(--surf);border-radius:var(--r);padding:15px 22px;text-align:center;
  box-shadow:var(--sh);border:1.5px solid var(--border);min-width:92px;transition:transform .2s}
.sbox:hover{transform:translateY(-3px)}
.sn{font-size:1.85rem;font-weight:900;line-height:1}
.sl{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.lgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(238px,1fr));gap:16px}
.lcard{background:var(--surf);border:1.5px solid var(--border);border-radius:18px;
  padding:25px 22px;cursor:pointer;position:relative;overflow:hidden;transition:transform .22s,box-shadow .22s,border-color .22s}
.lcard:hover{transform:translateY(-5px);box-shadow:var(--sh2)}
.lcard-top{height:4px;position:absolute;top:0;left:0;right:0;border-radius:18px 18px 0 0}
.lcard-ico{width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:1.55rem;margin-bottom:13px}
.lcard h2{font-size:1.12rem;font-weight:800;margin-bottom:4px}
.lcard p{font-size:.79rem;color:var(--muted);line-height:1.5;margin-bottom:13px}
.lcard-meta{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.lcard-bdg{font-size:.71rem;font-weight:800;padding:3px 10px;border-radius:20px;border:1.5px solid}
.lpw{flex:1;min-width:75px}
.lpbar{background:var(--border);border-radius:20px;height:5px;overflow:hidden}
.lpfill{height:100%;border-radius:20px;transition:width .5s}
.lptxt{font-size:.67rem;color:var(--muted);margin-top:3px}

/* ── LEVEL ── */
.phd{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.bk{display:flex;align-items:center;gap:5px;padding:7px 15px;border-radius:30px;
  border:1.5px solid var(--border);background:transparent;
  font-family:var(--f);font-size:.85rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s}
.bk:hover{background:var(--secl);border-color:var(--sec)}
.ptitle{font-size:1.7rem;font-weight:900;letter-spacing:-.02em}
.psub{font-size:.84rem;color:var(--muted);flex-basis:100%;margin-top:-5px}
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.cc{background:var(--surf);border:1.5px solid var(--border);border-radius:12px;
  padding:15px;cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:transform .18s,border-color .18s,box-shadow .18s;position:relative}
.cc:hover{transform:translateY(-2px);box-shadow:var(--sh)}
.cnum{width:41px;height:41px;border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.93rem}
.cinfo h3{font-size:.89rem;font-weight:800;line-height:1.3}
.cinfo p{font-size:.74rem;color:var(--muted);margin-top:2px}
.cdot{position:absolute;top:9px;right:9px;width:8px;height:8px;border-radius:50%;display:none}
.cc.done .cdot{display:block}

/* ── CHAPTER ── */
.bc{font-size:.77rem;color:var(--muted);margin-bottom:7px;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.bc span{cursor:pointer}.bc span:hover{color:var(--text);text-decoration:underline}
.ch-hd{margin-bottom:18px}
.ch-hd h1{font-size:clamp(1.25rem,3vw,1.8rem);font-weight:900;letter-spacing:-.02em;margin-bottom:4px}
.ch-hd p{font-size:.88rem;color:var(--muted)}
.tbar{display:inline-flex;align-items:center;gap:10px;background:var(--surf);
  border:1.5px solid var(--border);border-radius:30px;padding:7px 15px;margin-bottom:15px;flex-wrap:wrap}
.td{font-family:var(--mono);font-weight:600;font-size:.9rem;min-width:48px;color:var(--text)}
.tbtn{padding:4px 10px;border-radius:20px;border:none;cursor:pointer;font-family:var(--f);font-size:.76rem;font-weight:700;transition:all .2s}
.ts{background:var(--cap);color:#fff}.tp{background:var(--border);color:var(--text)}.tr{background:transparent;color:var(--muted);border:1px solid var(--border)}
.trow{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.tlb{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:30px;
  border:1.5px solid var(--border);background:transparent;font-family:var(--f);font-size:.8rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s}
.tlb:hover{background:var(--surf2);border-color:var(--muted)}
.tnav{display:flex;gap:3px;background:var(--surf);border:1.5px solid var(--border);
  border-radius:50px;padding:4px;width:fit-content;margin-bottom:22px;flex-wrap:wrap}
.tb{padding:8px 17px;border-radius:40px;border:none;background:transparent;
  font-family:var(--f);font-size:.83rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap}
.tb.on{color:#fff;font-weight:800}
.tc{display:none}.tc.on{display:block;animation:fadeUp .22s}

/* ── COURS ── */
.cs{margin-bottom:26px}
.csh{font-size:1rem;font-weight:800;margin-bottom:10px;padding-left:11px;border-left:4px solid;color:var(--text)}
.cb{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--r);padding:19px;font-size:.9rem;line-height:1.75}
.fb{border-radius:var(--rs);padding:13px 17px;margin:11px 0;font-family:var(--mono);font-size:.87rem;line-height:1.7;border-left:3px solid}
.ex{border-radius:var(--rs);padding:11px 15px;margin:9px 0;font-size:.89rem;line-height:1.65}
.defb{border-radius:0 var(--rs) var(--rs) 0;padding:11px 15px;margin:9px 0;border-left:3px solid;font-size:.89rem;line-height:1.65}
.tip{border-radius:var(--rs);padding:10px 14px;margin:8px 0;font-size:.86rem;display:flex;align-items:flex-start;gap:7px;background:rgba(217,119,6,.08);border:1px solid rgba(217,119,6,.25);color:#92400e}
.dark .tip{color:#fbbf24;background:rgba(217,119,6,.12)}
table.mt{border-collapse:collapse;width:100%;font-size:.87rem;margin:11px 0}
table.mt th,table.mt td{border:1.5px solid var(--border);padding:8px 12px;text-align:center;vertical-align:middle}
table.mt th{font-weight:800;background:var(--bg2)}
table.mt td{background:var(--surf)}
.dark table.mt td{background:var(--surf2)}
.schema{text-align:center;margin:14px 0}
.schema svg{max-width:100%}
.scap{font-size:.74rem;color:var(--muted);margin-top:4px;font-style:italic;text-align:center}

/* ── EXERCICES ── */
.exos{margin-bottom:20px}
.dbdg{display:inline-flex;align-items:center;gap:5px;font-size:.73rem;font-weight:800;
  padding:4px 11px;border-radius:20px;margin-bottom:9px;border:1.5px solid}
.ec{background:var(--surf);border:1.5px solid var(--border);border-radius:12px;
  padding:16px 17px;margin-bottom:9px;border-left:4px solid}
.en{font-weight:800;margin-bottom:5px;font-size:.88rem}
.ec p{font-size:.89rem;line-height:1.65}
.scb{margin-top:10px;padding:5px 13px;border-radius:20px;border:1.5px solid;background:transparent;
  font-family:var(--f);font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s}
.corb{margin-top:9px;display:none;background:var(--bg2);border-radius:var(--rs);padding:12px 14px;font-size:.86rem;line-height:1.7;border:1px dashed var(--border)}
.corb.open{display:block;animation:fadeUp .2s}

/* ── QUIZ ── */
.qwrap{max-width:640px}
.qhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:9px}
.qhd h2{font-size:1.12rem;font-weight:900}
.qprog{display:flex;align-items:center;gap:8px;font-size:.8rem;color:var(--muted)}
.qpbar{background:var(--border);border-radius:20px;height:6px;width:100px;overflow:hidden}
.qpf{height:100%;border-radius:20px;transition:width .4s}
.qcard{background:var(--surf);border:1.5px solid var(--border);border-radius:13px;padding:22px;margin-bottom:13px}
.qnum{font-size:.75rem;font-weight:800;color:var(--muted);margin-bottom:9px;text-transform:uppercase;letter-spacing:.05em}
.qt{font-size:.97rem;font-weight:700;line-height:1.55;margin-bottom:16px}
.qchs{display:flex;flex-direction:column;gap:7px}
.qc{padding:10px 15px;border-radius:9px;border:1.5px solid var(--border);
  background:var(--bg2);cursor:pointer;font-size:.88rem;font-weight:600;
  text-align:left;font-family:var(--f);color:var(--text);transition:all .18s}
.qc:hover:not(:disabled){border-color:var(--sec);background:var(--secl)}
.qc.ok{border-color:var(--cap)!important;background:var(--capl)!important;color:var(--capd);font-weight:800}
.qc.ko{border-color:#dc2626!important;background:rgba(220,38,38,.1)!important;color:#dc2626}
.qfb{padding:11px 14px;border-radius:9px;font-size:.87rem;font-weight:700;margin-bottom:11px;display:none}
.qfb.on{display:block;animation:fadeUp .18s}
.qfb.ok2{background:var(--capl);color:var(--capd);border:1px solid rgba(5,150,105,.3)}
.qfb.ko2{background:rgba(220,38,38,.1);color:#dc2626;border:1px solid rgba(220,38,38,.3)}
.qnx{padding:8px 20px;border-radius:30px;border:none;font-family:var(--f);font-size:.87rem;font-weight:800;cursor:pointer;display:none;transition:all .2s}
.qnx.on{display:inline-block;animation:fadeUp .2s}
.qsc{background:var(--surf);border:1.5px solid var(--border);border-radius:13px;padding:34px;text-align:center;display:none}
.qsc.on{display:block;animation:fadeUp .3s}
.sbn{font-size:3rem;font-weight:900;margin-bottom:7px}
.qrs{padding:9px 20px;border-radius:30px;border:1.5px solid;font-family:var(--f);font-size:.85rem;font-weight:800;cursor:pointer;background:transparent;transition:all .2s;margin-top:13px}

/* ── FLASH ── */
.fw{max-width:510px;margin:0 auto;text-align:center}
.fcnt{font-size:.79rem;color:var(--muted);margin-bottom:13px;font-weight:600}
.fcard{perspective:1000px;height:195px;cursor:pointer;margin-bottom:15px}
.fi{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.fi.flip{transform:rotateY(180deg)}
.ff{position:absolute;inset:0;border-radius:13px;background:var(--surf);border:1.5px solid var(--border);
  padding:22px;display:flex;align-items:center;justify-content:center;
  backface-visibility:hidden;flex-direction:column;gap:9px}
.ff.back{transform:rotateY(180deg)}
.flbl{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;padding:3px 9px;border-radius:20px;border:1.5px solid;margin-bottom:3px}
.ftxt{font-size:.97rem;font-weight:800;line-height:1.4}
.fhint{font-size:.76rem;color:var(--muted)}
.fnav{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
.fnb{padding:8px 17px;border-radius:30px;border:1.5px solid var(--border);background:transparent;
  font-family:var(--f);font-size:.82rem;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s}
.fnb:hover{background:var(--surf2)}

/* ── MODAL ── */
#pm{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,25,50,.55);backdrop-filter:blur(6px);align-items:center;justify-content:center}
#pm.open{display:flex}
.modal{background:var(--surf);border:1.5px solid var(--border);border-radius:20px;padding:26px;max-width:490px;width:92%;max-height:80vh;overflow-y:auto;box-shadow:var(--sh2);animation:fadeUp .25s}
.modal h2{font-size:1.18rem;font-weight:900;margin-bottom:16px}
.mc{float:right;background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--muted)}
.pl{margin-bottom:15px}
.pl h3{font-size:.87rem;font-weight:800;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.pbar{background:var(--border);border-radius:20px;height:8px;overflow:hidden;margin-bottom:4px}
.pbf{height:100%;border-radius:20px;transition:width .5s}
.pdet{font-size:.74rem;color:var(--muted)}
.rbtn{margin-top:13px;padding:7px 15px;border-radius:20px;border:1.5px solid #dc2626;background:transparent;color:#dc2626;font-family:var(--f);font-size:.78rem;font-weight:800;cursor:pointer}
.rbtn:hover{background:rgba(220,38,38,.08)}

@media(max-width:640px){
  #bar{padding:8px 12px}
  .logo{font-size:.98rem}
  #sw{max-width:165px}
  main{padding:16px 11px}
  .hero h1{font-size:1.55rem}
  .tnav{padding:3px}
  .tb{padding:7px 11px;font-size:.79rem}
  .bar-r .bbtn span{display:none}
}

/* ══════════════════════════════════════════════
   PARCOURS ADAPTATIF — CSS
   ══════════════════════════════════════════════ */

/* Bouton dans la topbar */
.pbt { display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:30px;
  border:2px solid var(--sec);background:var(--secl);
  font-family:var(--f);font-size:.84rem;font-weight:800;color:var(--secd);cursor:pointer;
  transition:all .2s;white-space:nowrap }
.pbt:hover { background:var(--sec);color:#fff;transform:translateY(-1px);box-shadow:0 4px 14px var(--sect) }

/* ─── PAGE LISTE ─── */
#p-parcours-list { animation:fadeUp .3s ease }
.prl-hero { text-align:center;padding:46px 20px 30px }
.prl-eyebrow { display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:800;
  letter-spacing:.09em;text-transform:uppercase;color:#7c3aed;background:#ede9fe;
  border:1.5px solid rgba(124,58,237,.3);border-radius:30px;padding:5px 14px;margin-bottom:14px }
.prl-hero h1 { font-size:clamp(1.7rem,4vw,2.6rem);font-weight:900;margin-bottom:8px }
.prl-hero p { color:var(--muted);font-size:.9rem;max-width:560px;margin:0 auto 10px;line-height:1.6 }
.prl-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px;padding-bottom:40px }
.prl-card { background:var(--surf);border:1.5px solid var(--border);border-radius:18px;
  padding:24px 20px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .22s,box-shadow .22s,border-color .22s }
.prl-card:hover { transform:translateY(-6px);box-shadow:0 12px 36px rgba(0,0,0,.13) }
.prl-card-top { height:4px;position:absolute;top:0;left:0;right:0;border-radius:18px 18px 0 0 }
.prl-icon { width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;margin-bottom:13px;font-weight:900 }
.prl-card h3 { font-size:1.1rem;font-weight:800;margin-bottom:4px }
.prl-card p { font-size:.8rem;color:var(--muted);margin-bottom:14px;line-height:1.5 }
.prl-levels { display:flex;flex-direction:column;gap:5px;margin-bottom:14px }
.prl-lvl { display:flex;align-items:center;gap:8px;font-size:.8rem;padding:5px 10px;
  border-radius:8px;background:var(--bg2);border:1px solid var(--border);color:var(--muted);
  transition:all .2s }
.prl-lvl.done { background:rgba(5,150,105,.1);border-color:#059669;color:#059669 }
.prl-check { margin-left:auto;font-size:.9rem }
.prl-prog { margin-top:10px }
.prl-prog-bar { background:var(--border);border-radius:20px;height:6px;overflow:hidden;margin-bottom:4px }
.prl-prog-bar div { height:100%;border-radius:20px;transition:width .5s }
.prl-prog span { font-size:.7rem;color:var(--muted) }
.prl-niveau-badge { position:absolute;top:14px;right:14px;font-size:.65rem;font-weight:800;
  padding:3px 9px;border-radius:20px;border:1.5px solid }

/* ─── PAGE PARCOURS RUN ─── */
#p-parcours-run { min-height:80vh }
#prun-header { padding:14px 0 18px }
.prun-back { display:flex;align-items:center;gap:5px;padding:7px 15px;border-radius:30px;
  border:1.5px solid var(--border);background:transparent;

const TIP = t     => `<div class="tip">💡 ${t}</div>`;

  `<div class="cs"><div class="csh" style="border-color:${c_(c)}">${n}. ${ti}</div><div class="cb">${body}</div></div>`;
const MT = (hs,rows) =>
  `<table class="mt"><tr>${hs.map(h=>`<th>${h}</th>`).join('')}</tr>${rows.map(r=>`<tr>${r.map(d=>`<td>${d}</td>`).join('')}</tr>`).join('')}</table>`;

{id:'s4',num:4,title:'Résolution d\'un problème du 1er degré',desc:'Équations et inéquations du 1er degré, méthodes algébrique et graphique',
cours:
  SEC('sec','1','Équation du premier degré',

    +EX('sec','<strong>Méthode algébrique :</strong> 350+15x = 500+10x<br>→ 15x−10x = 500−350 → 5x = 150 → <strong>x=30</strong>')

  +SEC('sec','2','Inéquation du premier degré',
    FB('sec','ax + b < c → ax < c − b → x < (c−b)/a si a > 0<br>⚠️ Si on divise par un nombre <strong>négatif</strong>, on <strong>inverse le sens</strong> de l\'inégalité !')
    +EX('sec','🪙 Carte prépayée 30€, 0,08€/min, garder au moins 5€ :<br>30 − 0,08t ≥ 5 → −0,08t ≥ −25 → t ≤ 312,5<br>→ On peut téléphoner jusqu\'à <strong>312,5 min ≈ 5h12</strong>')

  +SEC('sec','3','Mise en équation',

    +EX('sec','🛴 Loueur « Trotti » : 5,90€ + 0,15x€/min. Pour quel x le coût = 10,40€ ?<br>5,90 + 0,15x = 10,40 → 0,15x = 4,50 → <strong>x = 30 min</strong>')

exos:

  ${EXO('sec',1,'Équations',
    'Résous chaque équation. Vérifie :<br>a) 3x+8=20 &nbsp; b) 2x−5=x+7 &nbsp; c) 5(x−2)=15 &nbsp; d) x/3+4=9',
    'a) x=<strong>4</strong>·vérif:12+8=20✓ · b) x=<strong>12</strong>·vérif:19=19✓ · c) x=<strong>5</strong>·vérif:5×3=15✓ · d) x=<strong>15</strong>·vérif:5+4=9✓'
  )}</div>
  <div class="exos">${DIFF('sec','⭐⭐','Moyen')}
  ${EXO('sec',2,'Inéquations',
    'Résous :<br>a) 4x − 3 > 9 &nbsp; b) 2x + 6 ≤ 3x − 4 &nbsp; c) −3x + 12 ≥ 0',
    'a) 4x>12 → <strong>x>3</strong><br>b) 10≤x → <strong>x≥10</strong><br>c) 12≥3x → <strong>x≤4</strong>'

  <div class="exos">${DIFF('sec','⭐⭐⭐','Difficile')}

    'a) 20+0,05x = 8+0,10x → 12 = 0,05x → <strong>x = 240 min</strong><br>b) 20+0,05x < 8+0,10x → x>240 → <strong>Au-delà de 240 min, A est moins cher</strong>'
  )}</div>`,
quiz:[
  {q:'Solution de 2x+6=14 ?',c:['3','4','8','10'],a:1,exp:'2x=8 → x=4'},

  {q:'On résout −2x>6. La solution est :',c:['x>-3','x<-3','x>3','x<3'],a:1,exp:'−2x>6 → x<−3 (division par −2 = on inverse !).'},
  {q:'Solution de 3(x+1)=15 ?',c:['4','5','6','14'],a:0,exp:'x+1=5 → x=4'},
  {q:'Résoudre algébriquement consiste à :',c:['Tracer les droites','Trouver x par le calcul','Estimer la valeur','Tester des valeurs au hasard'],a:1,exp:'Méthode algébrique = résoudre par le calcul.'},
  {q:'La solution d\'une inéquation est :',c:['Une valeur unique','Un ensemble de valeurs','Toujours un entier','Toujours positive'],a:1,exp:'Une inéquation a généralement un ensemble infini de solutions.'},

// ─── S5 Représentation graphique et variations d'une fonction ───
{id:'s5',num:5,title:'Représentation graphique et variations',desc:'Modes de représentation, fonctions linéaires, tableau de variations, extremums',
cours:
  SEC('sec','1','Trois modes de représentation',
    DEF('sec','Une fonction peut être représentée par :<br>• Son <strong>expression algébrique</strong> : f(x)=x³+3x²−1<br>• Sa <strong>courbe représentative</strong> dans un repère<br>• Un <strong>tableau de valeurs</strong>')
    +EX('sec','f(x)=x³+3x²−1 : f(−2)=(−2)³+3×4−1=−8+12−1=<strong>3</strong>')
    +MT(['x','−2','−1','0','1'],
        [['f(x)','3','1','−1','3']])
  )
  +SEC('sec','2','Fonctions linéaires et proportionnalité',
    FB('sec','Situation de proportionnalité ↔ f(x)=ax (fonction linéaire)<br>a = coefficient de proportionnalité')
    +EX('sec','🛍️ Remise de 35% sur tout : y = 0,35x (x=prix initial, y=remise)<br>f(100)=35€ · f(200)=70€')
  )
  +SEC('sec','3','Tableau de variations et extremums',
    DEF('sec','<strong>Croissante :</strong> quand x↑, f(x)↑<br><strong>Décroissante :</strong> quand x↑, f(x)↓<br><strong>Maximum :</strong> valeur la plus grande atteinte<br><strong>Minimum :</strong> valeur la plus petite atteinte')

      <line x1="20" y1="100" x2="280" y2="100" stroke="var(--border)" stroke-width="1.5"/>

      <circle cx="140" cy="25" r="5" fill="var(--secd)"/>
      <text x="145" y="20" font-size="10" fill="var(--secd)" font-weight="bold">Max M</text>
      <text x="50" y="60" font-size="10" fill="var(--sec)">↗ croissante</text>
      <text x="185" y="70" font-size="10" fill="var(--sec)">↘ décroissante</text>
    `,'Tableau de variations : max au sommet')
  ),
exos:
  `<div class="exos">${DIFF('sec','⭐','Facile')}
  ${EXO('sec',1,'Lire un tableau de valeurs',
    'f est définie sur [−3;3] par le tableau :<br>'+MT(['x','−3','−2','−1','0','1','2','3'],
       [['f(x)','−4','1','4','5','4','1','−4']])+'<br>a) f(0)=? b) Antécédents de 1 par f ? c) Extremums ? d) Sens de variation ?',
    'a) f(0)=<strong>5</strong><br>b) f(−2)=1 et f(2)=1 → antécédents : <strong>−2 et 2</strong><br>c) Max=<strong>5</strong> en x=0 · Min=<strong>−4</strong> en x=−3 et x=3<br>d) Croissante sur [−3;0] · Décroissante sur [0;3]'
  )}</div>
  <div class="exos">${DIFF('sec','⭐⭐','Moyen')}
  ${EXO('sec',2,'Proportionnalité et fonction linéaire',
    '🚗 Un véhicule consomme 6,5L aux 100km. f(x)=0,065x<br>a) Consommation pour 350km ? b) Distance avec 40L ? c) Ce modèle est-il une proportionnalité ?',
    'a) f(350)=0,065×350=<strong>22,75L</strong><br>b) 0,065x=40 → x=40÷0,065≈<strong>615km</strong><br>c) Oui, f(x)=0,065x est une fonction <strong>linéaire → proportionnalité</strong>'
  )}</div>`,
quiz:[
  {q:'Dans f(x)=3x²−2, quelle est f(2) ?',c:['8','10','12','14'],a:1,exp:'3×4−2=12−2=10'},
  {q:'L\'antécédent de 7 par f(x)=x+3 est :',c:['4','7','10','3'],a:0,exp:'x+3=7 → x=4'},
  {q:'f croissante sur [1;5] signifie :',c:['f(1)>f(5)','f(1)<f(5)','f est constante','f est nulle'],a:1,exp:'Croissante → quand x augmente, f(x) augmente.'},
  {q:'Une fonction linéaire est de la forme :',c:['f(x)=ax+b','f(x)=ax','f(x)=x²','f(x)=a'],a:1,exp:'f(x)=ax est linéaire (passe par l\'origine).'},
  {q:'Un extremum est atteint quand la fonction :',c:['Est nulle','Change de sens de variation','Est constante','A sa plus grande pente'],a:1,exp:'Extremum = changement de sens (max ou min local).'},
  {q:'f(0)=−2 et f est définie par f(x)=ax+b. Que vaut b ?',c:['a','0','−2','2'],a:2,exp:'f(0)=a×0+b=b=−2'},
  {q:'Tableau : f(1)=8, f(2)=5, f(3)=3. La fonction est :',c:['Croissante','Décroissante','Constante','Inconnue'],a:1,exp:'8>5>3 quand x augmente → décroissante.'},
  {q:'La courbe de f(x)=4x passe par :',c:['(1;5)','(0;4)','(0;0)','(2;8)'],a:2,exp:'f(0)=0 → passe par l\'origine.'},
  {q:'Le maximum global de f sur [a;b] est :',c:['Le plus petit f(x)','Le plus grand f(x)','f(a)','f(b)'],a:1,exp:'Maximum global = valeur la plus grande atteinte sur [a;b].'},
  {q:'Si a=0 dans f(x)=ax, la droite est :',c:['Verticale','Montante','L\'axe des abscisses (y=0)','Impossible'],a:2,exp:'a=0 → f(x)=0 pour tout x → droite confondue avec l\'axe des x.'},
]},

// ─── S6 Fonctions affines et systèmes ───
{id:'s6',num:6,title:'Fonctions affines et systèmes',desc:'f(x)=ax+b, coefficient directeur, systèmes d\'équations',
cours:
  SEC('sec','1','Fonction affine',
    DEF('sec','f(x)=ax+b est une <strong>fonction affine</strong>.<br>a = <strong>coefficient directeur</strong> (pente de la droite)<br>b = <strong>ordonnée à l\'origine</strong> (valeur en x=0)<br>Si a>0 : croissante · Si a<0 : décroissante · Si a=0 : constante')
    +EX('sec','f(x)=0,5x−1 sur [−1;4] : a=0,5>0 → <strong>croissante</strong> · droite coupe l\'axe y en (0;−1)')
    +FB('sec','Taux d\'accroissement a = (f(x₂)−f(x₁)) ÷ (x₂−x₁)')
    +EX('sec','f(1)=3 et f(2)=0 → a=(0−3)÷(2−1)=<strong>−3</strong> · puis b: 3=−3×1+b → b=<strong>6</strong> → f(x)=−3x+6')
  )
  +SEC('sec','2','Résolution graphique d\'un système',
    DEF('sec','Un <strong>système de deux équations</strong> se résout graphiquement : on trace les deux droites. Le point d\'intersection est la solution.')
    +EX('sec','📱 Offre 1: f(x)=0,07x+6 · Offre 2 visible sur graphique<br>L\'abscisse du point d\'intersection = durée pour laquelle les offres coûtent le même prix.')
    +TIP('S\'il n\'y a pas de point d\'intersection (droites parallèles), le système n\'a pas de solution.')
  ),
exos:
  `<div class="exos">${DIFF('sec','⭐','Facile')}
  ${EXO('sec',1,'Lire et caractériser une fonction affine',
    'Pour chaque fonction, indique a, b, si elle est croissante/décroissante, et calcule f(3) :<br>a) f(x)=2x+5 &nbsp; b) g(x)=−3x+12 &nbsp; c) h(x)=−0,5x−2',
    'a) a=2, b=5, <strong>croissante</strong>, f(3)=11<br>b) a=−3, b=12, <strong>décroissante</strong>, g(3)=3<br>c) a=−0,5, b=−2, <strong>décroissante</strong>, h(3)=−3,5'
  )}</div>
  <div class="exos">${DIFF('sec','⭐⭐','Moyen')}
  ${EXO('sec',2,'Déterminer une fonction affine',
    '🌡️ Température de l\'atmosphère modélisée par f affine : f(200)=13,7°C et f(1000)=8,5°C.<br>a) Calcule a. b) Trouve b. c) Température à 2000m ?',
    'a) a=(8,5−13,7)÷(1000−200) = −5,2÷800 = <strong>−0,0065</strong><br>b) f(200)=13,7 → −0,0065×200+b=13,7 → b=<strong>15</strong><br>c) f(2000)=−0,0065×2000+15=−13+15=<strong>2°C</strong>'
  )}</div>
  <div class="exos">${DIFF('sec','⭐⭐⭐','Difficile')}
  ${EXO('sec',3,'Système graphique',
    '🛴 Trotti: f(x)=0,15x+5,90 · RoulLibre: g(x)=0,22x+2<br>a) Pour combien de minutes les prix sont-ils identiques ?<br>b) Quelle offre est moins chère pour 50 min ? Pour 70 min ?',
    'a) 0,15x+5,90=0,22x+2 → 3,90=0,07x → x=<strong>55,7 min</strong><br>b) Pour 50min: f=13,4€ · g=13€ → <strong>RoulLibre moins cher</strong><br>Pour 70min: f=16,4€ · g=17,4€ → <strong>Trotti moins cher</strong>'
  )}</div>`,
quiz:[
  {q:'Ordonnée à l\'origine de f(x)=3x−7 ?',c:['3','−7','0','7'],a:1,exp:'b=f(0)=3×0−7=−7'},
  {q:'Coefficient directeur de f(x)=−2x+8 ?',c:['−2','8','−8','2'],a:0,exp:'Dans ax+b, a est le coefficient directeur = −2.'},
  {q:'f(1)=5 et f(4)=11. Pente a = ?',c:['2','3','6','16'],a:0,exp:'a=(11−5)÷(4−1)=6÷3=2'},
  {q:'Droite y=4x−2. Pour quel x est-elle en y=6 ?',c:['1','2','3','8'],a:1,exp:'4x−2=6 → 4x=8 → x=2'},
  {q:'Deux droites parallèles ont :',c:['Même ordonnée à l\'origine','Même coefficient directeur','Se croisent en 1 point','Aucun point commun et même pente'],a:1,exp:'Parallèles = même coefficient directeur a.'},
  {q:'f(x)=0,5x+3 est croissante ou décroissante ?',c:['Croissante','Décroissante','Constante','Inconnue'],a:0,exp:'a=0,5>0 → croissante.'},
  {q:'La solution d\'un système se lit graphiquement comme :',c:['L\'ordonnée à l\'origine','L\'abscisse où les droites se croisent','Le coefficient directeur','La pente'],a:1,exp:'Solution = coordonnées du point d\'intersection.'},
  {q:'f(x)=−4x+20. Pour quel x a-t-on f(x)=0 ?',c:['4','5','6','8'],a:1,exp:'−4x+20=0 → x=5'},
  {q:'b dans f(x)=ax+b représente :',c:['La pente','L\'image de 0','Le maximum','L\'antécédent de 0'],a:1,exp:'b=f(0) = ordonnée à l\'origine.'},
  {q:'Taux d\'accroissement d\'une fonction affine est :',c:['Différent en chaque point','Constant sur tout ℝ','Nul','Égal à b'],a:1,exp:'Fonction affine = taux d\'accroissement constant = a.'},
]},

{id:'p5',num:5,title:'Fonctions polynômes de degré 2',desc:'Parabole, racines, discriminant, signe, forme factorisée',

        return {
          enonce: `f(x) = ${a}x² ${bVal>=0?'+ '+bVal:'− '+Math.abs(bVal)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}. Pour quelle valeur de x f admet-elle un ${typeExtrem} ?`,
          html: `<p class="pq-eq">f(x) = ${a}x² ${bVal>=0?'+ '+bVal:'− '+Math.abs(bVal)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}</p>
            <p class="pq-txt">f'(x) = 0 donne le ${typeExtrem} de f.<br>Résous <strong>f'(x) = 0</strong></p>`,
          reponse: x0,
          tolerance: 0,
          indice: `💡 f'(x) = ${2*a}x ${bVal>=0?'+ '+bVal:'− '+Math.abs(bVal)} · Résous f'(x) = 0`,
          aide: `📘 f'(x) = ${2*a}x + ${bVal} = 0<br>
            → x = ${-bVal} ÷ ${2*a} = <strong>${x0}</strong><br>
            f(${x0}) = <strong>${fval}</strong> (${typeExtrem})`,
          explication: `✅ ${typeExtrem[0].toUpperCase()+typeExtrem.slice(1)} en x = <strong>${x0}</strong><br>
            f(${x0}) = ${fval}`
        };
      }
    },
    {
      id:'deriv_n3', label:'Niveau 3', sublabel:'Optimisation professionnelle',
      icon:'📈', color:'#7c3aed',
      gen: () => {
        const x_opt = rnd(10,50)*2; // en unités
        const a_neg = -(rnd(1,3)); // coeff négatif pour max
        const max_val = rnd(500,3000); // valeur max
        // P(x) = a(x-x_opt)² + max_val = ax² - 2ax_opt*x + ax_opt² + max_val
        const b = -2*a_neg*x_opt;
        const c = a_neg*x_opt**2 + max_val;
        const valmax = a_neg*x_opt**2 + b*x_opt + c;
        return {
          enonce: `Bénéfice : P(x) = ${a_neg}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}. Pour combien d'unités le bénéfice est-il maximal ?`,
          html: `<div class="pq-ctx">💼 Optimisation</div>
            <p class="pq-eq">P(x) = ${a_neg}x² ${b>=0?'+ '+b:'− '+Math.abs(b)}x ${c>=0?'+ '+c:'− '+Math.abs(c)}</p>
            <p class="pq-txt">x = nombre d'unités produites.<br>Résous <strong>P'(x) = 0</strong> pour trouver le maximum.</p>`,
          reponse: x_opt,
          tolerance: 0,
          indice: `💡 P'(x) = ${2*a_neg}x ${b>=0?'+ '+b:'− '+Math.abs(b)} · Résous = 0`,
          aide: `📘 P'(x) = ${2*a_neg}x + ${b} = 0<br>
            x = ${-b} ÷ ${2*a_neg*-1} ... = x = ${x_opt} unités`,
          explication: `✅ Bénéfice max pour <strong>x = ${x_opt} unités</strong><br>
            P(${x_opt}) = ${Math.round(valmax)} €`
        };
      }
    }
  ]
},

// ── HELPERS ──────────────────────────────────────────────────────
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

// ── ÉTAT DU PARCOURS ─────────────────────────────────────────────
let PR = {
  parcours: null,      // parcours actif
  niveauIdx: 0,        // niveau actuel (0,1,2)
  question: null,      // question générée
  erreurs: 0,          // erreurs sur cette question
  total_questions: 0,  // total questions répondues
  correct_questions: 0,
  niveaux_completes: [],
  actif: false,
  score_etoiles: 0
};

// Sauvegarde progression parcours
function saveParcours(){
  const data = JSON.parse(localStorage.getItem('mp_parcours')||'{}');
  if(PR.parcours){
    data[PR.parcours.id] = {
      niveaux_completes: PR.niveaux_completes,
      date: Date.now()
    };
  }
  localStorage.setItem('mp_parcours',JSON.stringify(data));
}
function loadParcoursData(id){
  const data = JSON.parse(localStorage.getItem('mp_parcours')||'{}');
  return data[id] || { niveaux_completes:[] };
}

// ── PAGE LISTE DES PARCOURS ──────────────────────────────────────
function showPageParcours(){
  const data = JSON.parse(localStorage.getItem('mp_parcours')||'{}');
  document.getElementById('p-parcours-list').innerHTML = `
    <div class="prl-hero">
      <div class="prl-eyebrow">🎯 Entraînement adaptatif</div>
      <h1>Parcours d'entraînement</h1>
      <p>Réponds aux questions. En cas d'erreur, une nouvelle question du même type est générée.<br>Après 2 erreurs : indice · Après 3 erreurs : aide complète</p>
    </div>
    <div class="prl-grid">
      ${PARCOURS_DATA.map(p => {
        const saved = data[p.id]||{niveaux_completes:[]};
        const done = saved.niveaux_completes.length;
        const total = p.niveaux.length;
        const pct = Math.round(done/total*100);
        return `
        <div class="prl-card" onclick="startParcours('${p.id}')">
          <div class="prl-card-top" style="background:var(--${p.color})"></div>
          <div class="prl-icon" style="background:var(--${p.color}l);color:var(--${p.color})">${p.icon}</div>
          <h3>${p.titre}</h3>
          <p>${p.desc}</p>
          <div class="prl-levels">
            ${p.niveaux.map((n,i)=>`
              <div class="prl-lvl ${saved.niveaux_completes.includes(n.id)?'done':''}">
                <span>${n.icon}</span>
                <span>${n.label}</span>
                ${saved.niveaux_completes.includes(n.id)?'<span class="prl-check">✅</span>':''}
              </div>
            `).join('')}
          </div>
          <div class="prl-prog">
            <div class="prl-prog-bar"><div style="width:${pct}%;background:var(--${p.color})"></div></div>
            <span>${done}/${total} niveaux · ${pct}%</span>
          </div>
          <div class="prl-niveau-badge" style="color:var(--${p.color});border-color:var(--${p.color});background:var(--${p.color}l)">
            ${p.niveau==='cap'?'CAP':p.niveau==='sec'?'Seconde':p.niveau==='pre'?'Première':'Terminale'}
          </div>
        </div>`;
      }).join('')}
    </div>`;
  showP('parcours-list');
}

// ── DÉMARRER UN PARCOURS ─────────────────────────────────────────
function startParcours(id){
  const p = PARCOURS_DATA.find(x=>x.id===id);
  if(!p) return;
  const saved = loadParcoursData(id);
  PR = {
    parcours: p,
    niveauIdx: 0,
    question: null,
    erreurs: 0,
    total_questions: 0,
    correct_questions: 0,
    niveaux_completes: [...saved.niveaux_completes],
    actif: true,
    score_etoiles: 0
  };
  renderParcoursPage();
  showP('parcours-run');
  nextQuestion();
}

function renderParcoursPage(){
  const p = PR.parcours;
  const nv = p.niveaux[PR.niveauIdx];
  const color = p.color;
  document.getElementById('prun-header').innerHTML = `
    <button class="prun-back" onclick="confirmQuitterParcours()">← Quitter</button>
    <div class="prun-title">
      <span class="prun-icon" style="color:var(--${color})">${p.icon}</span>
      <strong>${p.titre}</strong>
    </div>
    <div class="prun-niveaux">
      ${p.niveaux.map((n,i)=>`
        <div class="prun-nv ${i===PR.niveauIdx?'active':''} ${PR.niveaux_completes.includes(n.id)?'done':''}"
          style="${i===PR.niveauIdx?`background:var(--${color});color:white;border-color:var(--${color})`:''}">
          ${n.icon} ${n.label}
        </div>`).join('')}
    </div>`;
  updateParcoursProgress();
}

function updateParcoursProgress(){
  const p = PR.parcours;
  const done = PR.niveaux_completes.length;
  const total = p.niveaux.length;
  const pct = Math.round(done/total*100);
  document.getElementById('prun-prog').innerHTML = `
    <div class="prun-prog-wrap">
      <div class="prun-prog-bar">
        <div class="prun-prog-fill" style="width:${pct}%;background:var(--${p.color})"></div>
      </div>
      <div class="prun-prog-txt">
        <span>${done}/${total} niveaux</span>
        <span class="prun-score">⭐ ${PR.score_etoiles} étoile${PR.score_etoiles>1?'s':''}</span>
        <span>${pct}%</span>
      </div>
    </div>`;
}

// ── GÉNÉRER UNE NOUVELLE QUESTION ────────────────────────────────
function nextQuestion(){
  const p = PR.parcours;
  if(PR.niveauIdx >= p.niveaux.length){
    showBravo();
    return;
  }
  const nv = p.niveaux[PR.niveauIdx];
  PR.question = nv.gen();
  PR.erreurs = 0;
  renderQuestion();
}

function renderQuestion(){
  const p = PR.parcours;
  const nv = p.niveaux[PR.niveauIdx];
  const q = PR.question;
  const color = p.color;
  document.getElementById('prun-question').innerHTML = `
    <div class="pq-card" id="pq-main">
      <div class="pq-niveau" style="color:var(--${color});background:var(--${color}l);border-color:var(--${color})">
        ${nv.icon} ${nv.label} — ${nv.sublabel}
      </div>
      <div class="pq-body">
        ${q.html || `<p class="pq-txt">${q.enonce}</p>`}
      </div>
      <div class="pq-input-zone" id="pq-input-zone">
        <label class="pq-label">Ta réponse :</label>
        <div class="pq-input-row">
          <input type="number" id="pq-input" class="pq-input" placeholder="Entrer la valeur…" 
            step="any" autocomplete="off"
            onkeydown="if(event.key==='Enter')validerParcours()">
          <button class="pq-btn" style="background:var(--${color})" onclick="validerParcours()">
            Vérifier ✓
          </button>
        </div>
      </div>
      <div id="pq-feedback" class="pq-feedback"></div>
      <div id="pq-indice" class="pq-indice" style="display:none"></div>
    </div>`;
  setTimeout(()=>document.getElementById('pq-input')?.focus(),100);
}

// ── VALIDER LA RÉPONSE ───────────────────────────────────────────
function validerParcours(){
  const q = PR.question;
  const input = document.getElementById('pq-input');
  if(!input) return;
  const val = parseFloat(input.value.replace(',','.'));
  if(isNaN(val)){ 
    shakeInput(); 
    showFeedback('⚠️ Entre un nombre valide (ex: 3.5)', 'warning');
    return;
  }
  const correct = Math.abs(val - q.reponse) <= (q.tolerance || 0);
  PR.total_questions++;
  if(correct){
    handleBonneReponse(val);
  } else {
    handleMauvaiseReponse(val);
  }
}

function handleBonneReponse(val){
  const p = PR.parcours;
  const nv = p.niveaux[PR.niveauIdx];
  const color = p.color;
  PR.correct_questions++;
  const etoiles = PR.erreurs===0?3:PR.erreurs===1?2:1;
  PR.score_etoiles += etoiles;
  
  // Marquer niveau comme complété si pas déjà fait
  if(!PR.niveaux_completes.includes(nv.id)){
    PR.niveaux_completes.push(nv.id);
    saveParcours();
  }
  updateParcoursProgress();
  
  // Afficher feedback succès
  const fb = document.getElementById('pq-feedback');
  fb.className = 'pq-feedback success';
  fb.innerHTML = `
    <div class="pqf-success">
      <div class="pqf-ico">✅</div>
      <div class="pqf-txt">
        <strong>Bonne réponse ! ${etoiles===3?'⭐⭐⭐':etoiles===2?'⭐⭐':'⭐'}</strong><br>
        ${PR.question.explication}
      </div>
    </div>`;
  
  // Désactiver input
  document.getElementById('pq-input').disabled = true;
  document.getElementById('pq-input').style.borderColor = '#059669';
  
  // Bouton continuer
  const inputZone = document.getElementById('pq-input-zone');
  const isLastNiveau = PR.niveauIdx >= p.niveaux.length - 1;
  const nextBtn = isLastNiveau
    ? `<button class="pq-btn-next" style="background:var(--${color})" onclick="showBravo()">
        🏆 Terminer le parcours
       </button>`
    : `<button class="pq-btn-next" style="background:var(--${color})" onclick="passerNiveauSuivant()">
        Niveau suivant → ${p.niveaux[PR.niveauIdx+1].icon} ${p.niveaux[PR.niveauIdx+1].label}
       </button>`;
  
  fb.innerHTML += `
    <div class="pqf-nav">
      <button class="pq-btn-autre" onclick="nextQuestion()">🔄 Autre question du même niveau</button>
      ${nextBtn}
    </div>`;
  
  // Animation confetti
  confettiParcours(color);
}

function handleMauvaiseReponse(val){
  PR.erreurs++;
  const q = PR.question;
  shakeInput();
  
  let feedbackHtml = `<div class="pqf-error">
    <strong>❌ Pas tout à fait…</strong> (${PR.erreurs} erreur${PR.erreurs>1?'s':''})<br>
    Ta réponse : ${val} · Réessaie !
  </div>`;
  
  // Indice après 2 erreurs
  if(PR.erreurs >= 2){
    feedbackHtml += `<div class="pqi-hint">💡 <strong>Indice :</strong><br>${q.indice}</div>`;
  }
  // Aide complète après 3 erreurs
  if(PR.erreurs >= 3){
    feedbackHtml += `<div class="pqi-aide">📘 <strong>Aide complète :</strong><br>${q.aide}</div>`;
  }
  
  const fb = document.getElementById('pq-feedback');
  fb.className = 'pq-feedback error';
  fb.innerHTML = feedbackHtml;
  
  // Générer nouvelle question après 2 erreurs
  if(PR.erreurs >= 2 && PR.erreurs < 4){
    feedbackHtml += `<div class="pqf-regen">
      <small>💫 Une nouvelle question du même type va apparaître dans 4 secondes…</small>
    </div>`;
    fb.innerHTML = feedbackHtml;
    setTimeout(()=>{
      if(PR.actif){
        PR.question = PR.parcours.niveaux[PR.niveauIdx].gen();
        // Garder le nombre d'erreurs
        renderQuestionAvecErreurs();
      }
    }, 4000);
  }
  
  // Après 4 erreurs : garder la question mais permettre de passer
  if(PR.erreurs >= 4){
    feedbackHtml += `<div class="pqf-nav">
      <button class="pq-btn-autre" onclick="PR.erreurs=0;nextQuestion()">🔄 Nouvelle question</button>
    </div>`;
    fb.innerHTML = feedbackHtml;
  }
  
  document.getElementById('pq-input').value = '';
  document.getElementById('pq-input').focus();
}

function renderQuestionAvecErreurs(){
  const q = PR.question;
  const erreurs = PR.erreurs;
  renderQuestion();
  // Réafficher les indices selon le nombre d'erreurs
  if(erreurs >= 2){
    const fb = document.getElementById('pq-feedback');
    fb.className = 'pq-feedback error';
    fb.innerHTML = `<div class="pqi-hint">💡 <strong>Indice :</strong><br>${q.indice}</div>`;
    if(erreurs >= 3){
      fb.innerHTML += `<div class="pqi-aide">📘 <strong>Aide complète :</strong><br>${q.aide}</div>`;
    }
  }
}

function passerNiveauSuivant(){
  PR.niveauIdx++;
  if(PR.niveauIdx >= PR.parcours.niveaux.length){ showBravo(); return; }
  renderParcoursPage();
  nextQuestion();
}

// ── BRAVO ─────────────────────────────────────────────────────────
function showBravo(){
  const p = PR.parcours;
  const color = p.color;
  const all_done = PR.niveaux_completes.length >= p.niveaux.length;
  document.getElementById('prun-question').innerHTML = `
    <div class="pq-bravo" id="pq-bravo">
      <div class="pq-bravo-top" style="background:linear-gradient(135deg,var(--${color}),var(--${color}d))">
        <div class="pq-bravo-ico">${all_done?'🏆':'⭐'}</div>
        <h2>${all_done?'Parcours terminé !':'Bien joué !'}</h2>
        <p>${all_done?`Tu as maîtrisé les ${p.niveaux.length} niveaux !`:`Parcours en cours — ${PR.niveaux_completes.length}/${p.niveaux.length} niveaux`}</p>
      </div>
      <div class="pq-bravo-stats">
        <div class="pq-stat"><div class="pq-stat-n" style="color:var(--${color})">${PR.score_etoiles}</div><div class="pq-stat-l">Étoiles</div></div>
        <div class="pq-stat"><div class="pq-stat-n" style="color:var(--${color})">${PR.correct_questions}</div><div class="pq-stat-l">Bonnes réponses</div></div>
        <div class="pq-stat"><div class="pq-stat-n" style="color:var(--${color})">${PR.total_questions}</div><div class="pq-stat-l">Questions</div></div>
      </div>
      <div class="pq-bravo-niveaux">
        ${p.niveaux.map((n,i)=>`
          <div class="pq-bravo-nv ${PR.niveaux_completes.includes(n.id)?'done':''}">
            <span>${n.icon}</span>
            <span>${n.label} — ${n.sublabel}</span>
            <span>${PR.niveaux_completes.includes(n.id)?'✅':'○'}</span>
          </div>`).join('')}
      </div>
      <div class="pq-bravo-btns">
        <button class="pq-btn" style="background:var(--${color})" onclick="startParcours('${p.id}')">🔄 Recommencer</button>
        <button class="pq-btn-sec" onclick="showPageParcours()">← Tous les parcours</button>
      </div>
    </div>`;
  confettiParcours(color, true);
  PR.actif = false;
}

// ── UTILS ──────────────────────────────────────────────────────────
function showFeedback(msg, type){
  const fb = document.getElementById('pq-feedback');
  if(!fb) return;
  fb.className = `pq-feedback ${type}`;
  fb.innerHTML = `<div class="pqf-${type}">${msg}</div>`;
}

function shakeInput(){
  const inp = document.getElementById('pq-input');
  if(!inp) return;
  inp.classList.add('shake');
  setTimeout(()=>inp.classList.remove('shake'),500);
}

function confirmQuitterParcours(){
  if(PR.actif && PR.total_questions > 0){
    if(!confirm('Quitter le parcours ? Ta progression du niveau en cours sera perdue.')) return;
  }
  PR.actif = false;
  showPageParcours();
}

// Confetti simple CSS
function confettiParcours(color, big=false){
  const container = document.getElementById('prun-question');
  if(!container) return;
  const n = big ? 24 : 10;
  for(let i=0;i<n;i++){

function() {

    ctx.strokeStyle='#9ca3af'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(pad,H-pad); ctx.lineTo(W-pad,H-pad); ctx.stroke();

    for (var i=0;i<=4;i++) {
      var x=pad+(W-2*pad)*i/4;
      ctx.fillStyle='#9ca3af'; ctx.font='11px Nunito'; ctx.textAlign='center';
      ctx.fillText((i/4*maxQ)+'kg', x, H-pad+16);

function() {
  window.animPctViz = function() {
    var base = +document.getElementById('pct-base').value;
    var taux = +document.getElementById('pct-taux').value;
    document.getElementById('pct-base-v').textContent = base;
    document.getElementById('pct-taux-v').textContent = taux;
    var part = +(base*taux/100).toFixed(2);
    var c = document.getElementById('pct-canvas');
    var ctx = c.getContext('2d');
    ctx.clearRect(0,0,480,100);
    var W=440,x0=20,y=20,h=50;
    ctx.fillStyle='#e5e7eb'; ctx.beginPath(); ctx.roundRect(x0,y,W,h,8); ctx.fill();
    var pw = W*taux/100;
    if (pw > 0) {
      var grad = ctx.createLinearGradient(x0,0,x0+pw,0);
      grad.addColorStop(0,'#2563eb'); grad.addColorStop(1,'#7c3aed');
      ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(x0,y,Math.max(pw,4),h,8); ctx.fill();
      if (pw > 50) { ctx.fillStyle='#fff'; ctx.font='bold 15px Nunito'; ctx.textAlign='center'; ctx.fillText(taux+'%',x0+pw/2,y+h/2+5); }
    }
    ctx.fillStyle='#374151'; ctx.font='13px Nunito'; ctx.textAlign='left';
    ctx.fillText(part+' €', x0+pw+8, y+h/2+5);
    document.getElementById('pct-result').innerHTML =
      '<div class="anim-result"><strong>'+taux+'% de '+base+' € = '+part+' €</strong><br>'
      +'<small>'+base+' × '+taux+' ÷ 100 = '+part+'</small></div>';
  };
  window.animPctOp = function() {
    var ri=+(document.getElementById('pct-ri').value||1);
    var rt=+(document.getElementById('pct-rt').value||0);
    var ai=+(document.getElementById('pct-ai').value||1);
    var at=+(document.getElementById('pct-at').value||0);
    var cmR=(1-rt/100).toFixed(2), rNv=(ri*(1-rt/100)).toFixed(2);
    var cmA=(1+at/100).toFixed(2), aNv=(ai*(1+at/100)).toFixed(2);
    document.getElementById('pct-remise-res').innerHTML =
      '<div class="pct-cm">CM = 1 − '+rt+'/100 = <strong>'+cmR+'</strong></div>'
      +'<div class="pct-nv">Prix final = <strong>'+rNv+' €</strong></div>';
    document.getElementById('pct-aug-res').innerHTML =
      '<div class="pct-cm">CM = 1 + '+at+'/100 = <strong>'+cmA+'</strong></div>'
      +'<div class="pct-nv">Prix final = <strong>'+aNv+' €</strong></div>';
  };
  window.animTV = function() {
    var v1=+document.getElementById('tv-v1').value||1;
    var v2=+document.getElementById('tv-v2').value||1;
    var tv=+((v2-v1)/v1*100).toFixed(1);
    var col=tv>=0?'#059669':'#dc2626';
    var c=document.getElementById('tv-canvas'); if(!c)return;
    var ctx=c.getContext('2d'); ctx.clearRect(0,0,480,160);
    var pad=60,barW=90,gap=60,maxV=Math.max(v1,v2);
    var h1=Math.round(120*v1/maxV),h2=Math.round(120*v2/maxV),y0=140;
    ctx.fillStyle='rgba(37,99,235,.2)'; ctx.fillRect(pad,y0-h1,barW,h1);
    ctx.strokeStyle='#2563eb'; ctx.lineWidth=2; ctx.strokeRect(pad,y0-h1,barW,h1);
    ctx.fillStyle=col+'33'; ctx.fillRect(pad+barW+gap,y0-h2,barW,h2);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(pad+barW+gap,y0-h2,barW,h2);
    ctx.fillStyle='#374151'; ctx.font='bold 13px Nunito'; ctx.textAlign='center';
    ctx.fillText(v1+' €',pad+barW/2,y0-h1-8); ctx.fillText(v2+' €',pad+barW+gap+barW/2,y0-h2-8);
    ctx.fillStyle='#9ca3af'; ctx.font='12px Nunito';
    ctx.fillText('Initial',pad+barW/2,y0+16); ctx.fillText('Final',pad+barW+gap+barW/2,y0+16);
    ctx.fillStyle=col; ctx.font='bold 16px Nunito';
    ctx.fillText((tv>=0?'▲ +':'▼ ')+tv+'%', pad+barW+gap/2, Math.min(y0-h1,y0-h2)-15);
    document.getElementById('tv-result').innerHTML =
      '<div class="anim-result" style="color:'+col+'">'
      +'Taux = ('+v2+' − '+v1+') ÷ '+v1+' × 100 = <strong>'+tv+'%</strong>'
      +'<br><small>'+(tv>=0?'Hausse':'Baisse')+' de '+Math.abs(tv)+'%</small></div>';
  };
  animPctViz(); animPctOp(); animTV();
}
);

    ctx.strokeStyle='#9ca3af'; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);

defAnim('s2',
function() { return `
<div class="anim-wrap">
  <div class="anim-header"><h2>📦 Boîte à moustaches</h2><p>Construis et interprète une boîte à moustaches</p></div>
  <div class="anim-section">
    <h3>🔢 Saisis ta série</h3>
    <label>Valeurs (séparées par des espaces) :</label>
    <textarea id="stat-input" class="stat-textarea" rows="2" oninput="animBoxplot()">12 15 18 20 22 24 25 28 30 35</textarea>
    <div id="stat-sorted"></div>
    <canvas id="boxplot-canvas" width="480" height="160"></canvas>
    <div id="boxplot-stats"></div>
  </div>
  <div class="anim-section">
    <h3>📊 Comparer deux séries</h3>
    <label>Série A : <input type="text" id="stat-a" value="10 12 15 18 20 22 25 28" style="width:100%;max-width:320px" oninput="animCompare()"></label>
    <label>Série B : <input type="text" id="stat-b" value="8 14 16 19 21 24 26 30 32" style="width:100%;max-width:320px" oninput="animCompare()"></label>
    <canvas id="compare-canvas" width="480" height="200"></canvas>
    <div id="compare-res"></div>
  </div>
</div>`; },
function() {
  function parseN(s){return s.trim().split(/\s+/).map(Number).filter(function(n){return !isNaN(n);}).sort(function(a,b){return a-b;});}
  function medOf(a){var n=a.length; return n%2===0?(a[n/2-1]+a[n/2])/2:a[Math.floor(n/2)];}
  function quartiles(arr){
    var n=arr.length;
    var lo=arr.slice(0,Math.floor(n/2)), hi=arr.slice(Math.ceil(n/2));
    return {min:arr[0],q1:medOf(lo),med:medOf(arr),q3:medOf(hi),max:arr[n-1]};
  }
  function drawBox(ctx,q,allMin,allMax,y,h,col) {
    var W=440,x0=20,sc=W/(allMax-allMin||1);
    function px(v){return x0+(v-allMin)*sc;}
    ctx.fillStyle=col+'22'; ctx.strokeStyle=col; ctx.lineWidth=2;
    ctx.fillRect(px(q.q1),y,px(q.q3)-px(q.q1),h);
    ctx.strokeRect(px(q.q1),y,px(q.q3)-px(q.q1),h);
    ctx.beginPath(); ctx.moveTo(px(q.med),y); ctx.lineTo(px(q.med),y+h); ctx.lineWidth=3; ctx.stroke(); ctx.lineWidth=2;
    [[q.min,q.q1],[q.q3,q.max]].forEach(function(p){
      ctx.beginPath(); ctx.moveTo(px(p[0]),y+h/2); ctx.lineTo(px(p[1]),y+h/2); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px(p[0]),y+5); ctx.lineTo(px(p[0]),y+h-5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(px(p[1]),y+5); ctx.lineTo(px(p[1]),y+h-5); ctx.stroke();
    });
  }
  window.animBoxplot = function() {
    var arr=parseN(document.getElementById('stat-input').value);
    if(arr.length<4){document.getElementById('boxplot-stats').innerHTML='<span style="color:#dc2626">⚠️ Au moins 4 valeurs</span>';return;}
    var q=quartiles(arr);
    document.getElementById('stat-sorted').innerHTML='<div class="stat-sorted-row">'+arr.map(function(v){
      var cls=v===q.med?'pq-val stat-med':'pq-val'; return '<span class="'+cls+'">'+v+'</span>';
    }).join('')+'</div>';
    var c=document.getElementById('boxplot-canvas'), ctx=c.getContext('2d');
    ctx.clearRect(0,0,480,160);
    drawBox(ctx,q,q.min,q.max,40,70,'#2563eb');
    ['Min','Q1','Méd','Q3','Max'].forEach(function(l,i){
      var v=[q.min,q.q1,q.med,q.q3,q.max][i];
      var W=440,x0=20,sc=W/(q.max-q.min||1);
      var px=x0+(v-q.min)*sc;
      ctx.fillStyle='#374151'; ctx.font='11px Nunito'; ctx.textAlign='center';
      ctx.fillText(l,px,35); ctx.fillText(v,px,130);
    });
    document.getElementById('boxplot-stats').innerHTML='<div class="anim-table-wrap"><table class="anim-table"><tr><th>Min</th><th>Q1</th><th>Médiane</th><th>Q3</th><th>Max</th><th>Étendue</th><th>IQ</th></tr>'
      +'<tr><td>'+q.min+'</td><td>'+q.q1+'</td><td>'+q.med+'</td><td>'+q.q3+'</td><td>'+q.max+'</td><td>'+(q.max-q.min)+'</td><td>'+(q.q3-q.q1)+'</td></tr></table></div>';
  };
  window.animCompare = function() {
    var a=parseN(document.getElementById('stat-a').value), b=parseN(document.getElementById('stat-b').value);
    if(a.length<4||b.length<4) return;
    var qa=quartiles(a), qb=quartiles(b);
    var allMin=Math.min(qa.min,qb.min), allMax=Math.max(qa.max,qb.max);
    var c=document.getElementById('compare-canvas'), ctx=c.getContext('2d');
    ctx.clearRect(0,0,480,200);
    drawBox(ctx,qa,allMin,allMax,30,60,'#2563eb');
    drawBox(ctx,qb,allMin,allMax,110,60,'#059669');
    ctx.fillStyle='#2563eb'; ctx.font='bold 11px Nunito'; ctx.textAlign='left'; ctx.fillText('Série A',5,65);
    ctx.fillStyle='#059669'; ctx.fillText('Série B',5,145);
    var ma=+(a.reduce(function(s,v){return s+v;},0)/a.length).toFixed(1);
    var mb=+(b.reduce(function(s,v){return s+v;},0)/b.length).toFixed(1);
    document.getElementById('compare-res').innerHTML='<div class="anim-table-wrap"><table class="anim-table"><tr><th></th><th>Médiane</th><th>IQ</th><th>Étendue</th><th>Moyenne</th></tr>'
      +'<tr><td style="color:#2563eb;font-weight:800">Série A</td><td>'+qa.med+'</td><td>'+(qa.q3-qa.q1)+'</td><td>'+(qa.max-qa.min)+'</td><td>'+ma+'</td></tr>'
      +'<tr><td style="color:#059669;font-weight:800">Série B</td><td>'+qb.med+'</td><td>'+(qb.q3-qb.q1)+'</td><td>'+(qb.max-qb.min)+'</td><td>'+mb+'</td></tr></table></div>'
      +'<div class="anim-tip">'+(qa.med>qb.med?'📊 Médiane A > Médiane B':'📊 Médiane B > Médiane A')+' · '
      +(qa.q3-qa.q1<qb.q3-qb.q1?'Série A plus concentrée':'Série B plus concentrée')+'</div>';
  };
  animBoxplot(); animCompare();
}
);

function() {
  window.animSuite = function() {
    var u1=+document.getElementById('su-u1').value||0;
    var r=+document.getElementById('su-r').value;
    var n=+document.getElementById('su-n').value;
    document.getElementById('su-r-v').textContent=r;
    document.getElementById('su-n-v').textContent=n;
    var terms=[];
    for(var i=0;i<n;i++) terms.push(+(u1+i*r).toFixed(2));
    var c=document.getElementById('suite-canvas'), ctx=c.getContext('2d');
    ctx.clearRect(0,0,480,240);
    var pad=50,W=480-2*pad,H=180;
    var mn=Math.min.apply(null,terms)-Math.abs(r), mx=Math.max.apply(null,terms)+Math.abs(r);
    var sx=W/(n-1||1), sy=H/(mx-mn||1);
    function px(i){return pad+i*sx;} function py(v){return pad+H-(v-mn)*sy;}
    ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=1;
    for(var i=0;i<=4;i++){var y=pad+i*(H/4);ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(pad+W,y);ctx.stroke();}

  };

}
);

defAnim('p5',

function() {

    for(var i=-7;i<=7;i++){ctx.beginPath();ctx.moveTo(cx+i*sc,0);ctx.lineTo(cx+i*sc,H);ctx.stroke();ctx.beginPath();ctx.moveTo(0,cy+i*sc);ctx.lineTo(W,cy+i*sc);ctx.stroke();}
    ctx.strokeStyle='#d1d5db'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
    if(a!==0){
      ctx.strokeStyle='#2563eb'; ctx.lineWidth=2.5; ctx.beginPath();
      var started=false;
      for(var px=0;px<=W;px+=1.5){
        var x=(px-cx)/sc, y=a*x*x+b*x+cv, py=cy-y*sc;
        if(py>-20&&py<H+20){if(!started){ctx.moveTo(px,py);started=true;}else ctx.lineTo(px,py);}else started=false;
      }
      ctx.stroke();
      var x0=-b/(2*a), y0=a*x0*x0+b*x0+cv;
      var spx=cx+x0*sc, spy=cy-y0*sc;

      var delta=b*b-4*a*cv, racines='';

    else if(d===0) html+='✅ Δ=0 → <strong>racine double</strong> x₀='+(-b/(2*a)).toFixed(3);
    else html+='❌ Δ<0 → <strong>aucune racine réelle</strong>';
    document.getElementById('delta-res').innerHTML='<div class="anim-result">'+html+'</div>';
  };
  animPoly(); animDelta();
}
);

    ctx.fillStyle='#dc2626'; ctx.beginPath(); ctx.arc(cx+x0*sc,cy-y0v*sc,7,0,Math.PI*2); ctx.fill();

  };

}

defAnim('t8',
function() { return `

      </select>

    <label>a = <input type="range" id="integ-a" min="-2" max="2" step="0.5" value="0" oninput="animInteg()"> <span id="integ-a-v" class="anim-val">0</span></label>
    <label>b = <input type="range" id="integ-b" min="1" max="5" step="0.5" value="3" oninput="animInteg()"> <span id="integ-b-v" class="anim-val">3</span></label>

function() {
  var intFns={
    lin:{f:function(x){return 2*x+1;},F:function(x){return x*x+x;}},
    quad:{f:function(x){return x*x-2*x+3;},F:function(x){return x*x*x/3-x*x+3*x;}},
    pos:{f:function(x){return -x*x+4*x;},F:function(x){return -x*x*x/3+2*x*x;}},
    cube:{f:function(x){return x*x*x-3*x+2;},F:function(x){return x*x*x*x/4-1.5*x*x+2*x;}}
  };
  window.animInteg = function() {
    var key=document.getElementById('integ-fn').value;
    var a=+parseFloat(document.getElementById('integ-a').value).toFixed(1);
    var bv=+parseFloat(document.getElementById('integ-b').value).toFixed(1);
    if(bv<=a) bv=a+0.5;
    var nr=+document.getElementById('integ-n').value;
    document.getElementById('integ-a-v').textContent=a;
    document.getElementById('integ-b-v').textContent=bv;
    document.getElementById('integ-n-v').textContent=nr;
    var fn=intFns[key];

    ctx.clearRect(0,0,480,270);
    var W=480,H=270,padL=55,padB=40,padT=20,plotW=W-padL-10,plotH=H-padB-padT;
    var xs=[],ys=[];
    for(var i=0;i<=200;i++){var x=a-0.3+(bv-a+0.6)*i/200;xs.push(x);ys.push(fn.f(x));}
    var mn=Math.min.apply(null,ys.concat([0])), mx=Math.max.apply(null,ys);
    var range=mx-mn||1;
    function px(x){return padL+(x-a+0.3)*(plotW/(bv-a+0.6));}
    function py(y){return padT+plotH*(1-(y-mn*1.1)/(range*1.3));}
    ctx.strokeStyle='#f3f4f6'; ctx.lineWidth=1;
    for(var i=0;i<=5;i++){var y=padT+i*(plotH/5);ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-10,y);ctx.stroke();}
    var dy=py(0);
    ctx.strokeStyle='#9ca3af'; ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(padL,dy);ctx.lineTo(W-10,dy);ctx.stroke();
    var step=(bv-a)/nr;
    ctx.fillStyle='rgba(37,99,235,.22)';
    for(var i=0;i<nr;i++){
      var xi=a+i*step, fxi=fn.f(xi+step/2);
      var rx=px(xi), rw=px(xi+step)-px(xi);
      var ry=fxi>=0?py(fxi):dy, rh=Math.abs(dy-py(fxi));
      ctx.fillRect(rx,ry,rw,rh);
    }
    ctx.strokeStyle='#2563eb'; ctx.lineWidth=2.5; ctx.beginPath();
    xs.forEach(function(x,i){if(i===0)ctx.moveTo(px(x),py(fn.f(x)));else ctx.lineTo(px(x),py(fn.f(x)));});
    ctx.stroke();
    ctx.strokeStyle='#dc2626'; ctx.lineWidth=2; ctx.setLineDash([5,3]);
    ctx.beginPath();ctx.moveTo(px(a),padT);ctx.lineTo(px(a),padT+plotH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(px(bv),padT);ctx.lineTo(px(bv),padT+plotH);ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='#dc2626'; ctx.font='bold 12px Nunito'; ctx.textAlign='center';
    ctx.fillText('a='+a,px(a),padT+plotH+18); ctx.fillText('b='+bv,px(bv),padT+plotH+18);
    var exact=+(fn.F(bv)-fn.F(a)).toFixed(4);
    var approx=0; for(var i=0;i<nr;i++) approx+=fn.f(a+(i+0.5)*step);
    approx=+(approx*step).toFixed(4);
    document.getElementById('integ-res').innerHTML='<div class="anim-result">∫<sub>'+a+'</sub><sup>'+bv+'</sup>f(x)dx = F('+bv+') − F('+a+') = <strong>'+exact+' u.a.</strong><br>Approx ('+nr+' rectangles) : <strong>'+approx+'</strong><br><small>Erreur : '+Math.abs(exact-approx).toFixed(4)+' u.a.</small></div>';
  };
  animInteg();
}
);

// ══════════════════════════════════════════════════════════════════
// ANIMATION GÉNÉRIQUE (pour les chapitres sans animation dédiée)
// ══════════════════════════════════════════════════════════════════
const ANIM_GENERIQUE = function(ch) {
  return {
    html: function() { return '<div class="anim-wrap"><div class="anim-header"><h2>🎬 '+ch.title+'</h2><p>Exploration interactive des notions du chapitre</p></div><div class="anim-section anim-coming"><div class="anim-coming-icon">🚧</div><h3>Animation en cours de création</h3><p>Utilise les onglets <strong>Cours</strong> et <strong>Exercices</strong> pour travailler ce chapitre.</p><div class="anim-tip">💡 Conseil : commence par lire le cours, puis essaie les exercices progressifs.</div></div></div>'; },
    init: function() {}
  };
};

// ══════════════════════════════════════════════════════════════════
// FONCTION PRINCIPALE D'INJECTION
// ══════════════════════════════════════════════════════════════════
function getAnimForChapter(ch) {
  var anim = ANIMATIONS[ch.id] || ANIM_GENERIQUE(ch);
  return { html: anim.html(), init: anim.init };
}
// ── STATE ──
let visited=JSON.parse(localStorage.getItem('mp4_v')||'{}');
let curLvl=null,curCh=null;
let tSecs=0,tRun=false,tInt=null;
let qIdx=0,qScore=0,qDone=false;
let flashCards=[],flashIdx=0;
const save=()=>localStorage.setItem('mp4_v',JSON.stringify(visited));

// ── NAVIGATION ──
function showP(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+id).classList.add('on');
  window.scrollTo(0,0);
}
function goHome(){showP('home');updateHome();}

function showLevel(k){
  curLvl=k; const lv=LVL[k];
  document.getElementById('ltitle').textContent=lv.label;
  document.getElementById('lsub').textContent=lv.sub;
  document.getElementById('cgrid').innerHTML=lv.chapters.map(ch=>
    `<div class="cc ${visited[ch.id]?'done':''}" onclick="openChap('${k}','${ch.id}')">
       <div class="cnum" style="background:var(--${lv.color}l);color:var(--${lv.color})">${ch.num}</div>
       <div class="cinfo"><h3>${ch.title}</h3><p>${ch.desc}</p></div>
       <div class="cdot" style="background:var(--${lv.color})"></div>
     </div>`).join('');
  showP('level');
}

function openChap(k,id){
  curLvl=k; const lv=LVL[k];
  const ch=lv.chapters.find(c=>c.id===id);
  curCh=ch; visited[id]=true; save();
  const col=lv.color;
  document.getElementById('bc').innerHTML=
    `<span onclick="goHome()">🏠 Accueil</span> › <span onclick="showLevel('${k}')">${lv.label}</span> › <strong>${ch.title}</strong>`;
  document.getElementById('bklvl').onclick=()=>showLevel(k);
  document.getElementById('chtit').textContent=`Ch.${ch.num} — ${ch.title}`;
  document.getElementById('chdesc').textContent=ch.desc;
  document.getElementById('tc-cours').innerHTML=ch.cours||'<p style="color:var(--muted)">Cours à venir.</p>';
  document.getElementById('tc-exos').innerHTML=ch.exos||'<p style="color:var(--muted)">Exercices à venir.</p>';
  document.getElementById('tc-cors').innerHTML=buildCors(ch.exos||'');
  document.getElementById('tc-quiz').innerHTML=buildQuiz(ch,col);
  document.getElementById('tc-flash').innerHTML=buildFlash(ch,col);
  const _animObj = getAnimForChapter(ch);
  const _animDiv = document.getElementById('tc-anim');
  _animDiv.innerHTML = _animObj.html;
  // Exécuter l'init après que le DOM soit en place
  if (_animObj.init) {
    try { _animObj.init(); } catch(e) { console.warn('Anim init error:', e); }
  }
  const tbs=document.querySelectorAll('.tnav .tb');
  tbs.forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  tbs[0].classList.add('on');
  tbs[0].style.background=`var(--${col})`;
  tbs[0].style.color='#fff';
  document.querySelectorAll('.tc').forEach(t=>t.classList.remove('on'));
  document.getElementById('tc-cours').classList.add('on');
  tReset();
  showP('chap'); updateHome();
}

function buildCors(html){
  const d=document.createElement('div'); d.innerHTML=html;
  d.querySelectorAll('.corb').forEach(b=>b.style.display='block');
  d.querySelectorAll('.scb').forEach(b=>b.remove());
  return d.innerHTML||'<p style="color:var(--muted)">Consultez les corrections dans l\'onglet Exercices.</p>';
}

function showTab(t){
  const map={cours:0,exos:1,cors:2,quiz:3,flash:4,anim:5};
  const tbs=document.querySelectorAll('.tnav .tb');
  document.querySelectorAll('.tc').forEach(tc=>tc.classList.remove('on'));
  tbs.forEach(b=>{b.classList.remove('on');b.style.background='';b.style.color='';});
  const i=map[t];
  tbs[i].classList.add('on');
  if(curLvl){tbs[i].style.background=`var(--${LVL[curLvl].color})`;tbs[i].style.color='#fff';}
  document.getElementById('tc-'+t).classList.add('on');
}

function toggleCor(btn){
  const b=btn.nextElementSibling;
  const open=b.style.display==='block';
  b.style.display=open?'none':'block';
  btn.textContent=open?'Voir la correction':'Masquer';
}

// ── TIMER ──
function tGo(){
  if(tRun)return; tRun=true;
  document.getElementById('tstart').style.display='none';
  document.getElementById('tstop').style.display='inline-block';
  tInt=setInterval(()=>{
    tSecs++;
    document.getElementById('tdisp').textContent=
      String(Math.floor(tSecs/60)).padStart(2,'0')+':'+String(tSecs%60).padStart(2,'0');
  },1000);
}
function tPause(){
  if(!tRun)return; tRun=false; clearInterval(tInt);
  document.getElementById('tstart').style.display='inline-block';
  document.getElementById('tstop').style.display='none';
}
function tReset(){
  tPause(); tSecs=0;
  document.getElementById('tdisp').textContent='00:00';
}

// ── QUIZ ──
function buildQuiz(ch,col){
  const qs=ch.quiz||[];
  if(!qs.length) return '<p style="color:var(--muted);padding:16px">Quiz à venir.</p>';
  qIdx=0; qScore=0; qDone=false;
  return `<div class="qwrap">
  <div class="qhd"><h2>🎯 Quiz — ${ch.title}</h2>
    <div class="qprog"><span id="qn">1/${qs.length}</span>
      <div class="qpbar"><div class="qpf" id="qpf" style="width:${100/qs.length}%;background:var(--${col})"></div></div>
    </div>
  </div>
  ${qs.map((q,i)=>`
  <div class="qcard" id="qq${i}" style="display:${i===0?'block':'none'}">
    <div class="qnum">Question ${i+1}/${qs.length}</div>
    <div class="qt">${q.q}</div>
    <div class="qchs">
      ${q.c.map((c,j)=>`<button class="qc" onclick="ansQ(${i},${j})"><strong>${['A','B','C','D'][j]}.</strong> ${c}</button>`).join('')}
    </div>
  </div>`).join('')}
  <div class="qfb" id="qfb"></div>
  <button class="qnx" id="qnx" style="background:var(--${col});color:#fff" onclick="nxtQ()">Question suivante →</button>
  <div class="qsc" id="qsc">
    <div class="sbn" id="qsn" style="color:var(--${col})"></div>
    <p id="qsmsg" style="color:var(--muted);font-size:.92rem;margin-bottom:6px"></p>
    <button class="qrs" style="border-color:var(--${col});color:var(--${col})" onclick="restartQ()">↺ Recommencer</button>
  </div></div>`;
}

function ansQ(qi,ci){
  if(qDone)return; qDone=true;
  const q=curCh.quiz[qi];
  document.querySelectorAll(`#qq${qi} .qc`).forEach((b,j)=>{
    b.disabled=true;
    if(j===q.a)b.classList.add('ok');
    else if(j===ci)b.classList.add('ko');
  });
  if(ci===q.a)qScore++;
  const fb=document.getElementById('qfb');
  fb.className='qfb on '+(ci===q.a?'ok2':'ko2');
  fb.innerHTML=(ci===q.a?'✅ Bonne réponse ! ':'❌ Faux. ')+q.exp;
  const n=document.getElementById('qnx');
  n.className='qnx on';
  n.textContent=qi===curCh.quiz.length-1?'Voir mon score ✨':'Question suivante →';
}

function nxtQ(){
  const qs=curCh.quiz;
  document.getElementById('qfb').className='qfb';
  document.getElementById('qnx').className='qnx';
  document.getElementById('qq'+qIdx).style.display='none';
  qIdx++; qDone=false;
  if(qIdx>=qs.length){
    const pct=Math.round(qScore/qs.length*100);
    document.getElementById('qsc').className='qsc on';
    document.getElementById('qsn').textContent=`${qScore}/${qs.length}`;
    const m=['Continue ! 💪','Pas mal ! 👍','Bien joué ! 🎉','Excellent ! 🏆'];
    document.getElementById('qsmsg').textContent=m[Math.min(Math.floor(pct/26),3)];
  } else {
    document.getElementById('qq'+qIdx).style.display='block';
    document.getElementById('qpf').style.width=Math.round((qIdx+1)/qs.length*100)+'%';
    document.getElementById('qn').textContent=`${qIdx+1}/${qs.length}`;
  }
}

function restartQ(){
  document.getElementById('qsc').className='qsc';
  document.getElementById('qfb').className='qfb';
  document.getElementById('qnx').className='qnx';
  document.querySelectorAll('.qc').forEach(b=>{b.disabled=false;b.className='qc';});
  qIdx=0;qScore=0;qDone=false;
  document.querySelectorAll('.qcard').forEach((el,i)=>el.style.display=i===0?'block':'none');
  const qs=curCh.quiz;
  document.getElementById('qn').textContent=`1/${qs.length}`;
  document.getElementById('qpf').style.width=`${100/qs.length}%`;
}

// ── FLASHCARDS ──
function getCards(ch){
  const cards=[];
  const tmp=document.createElement('div'); tmp.innerHTML=ch.cours||'';
  tmp.querySelectorAll('.fb').forEach((el,i)=>
    cards.push({f:'📐 Formule '+(i+1),b:el.textContent.trim().split('\n').filter(l=>l.trim()).slice(0,2).join(' · ')}));
  tmp.querySelectorAll('.defb').forEach((el,i)=>
    cards.push({f:'📖 Définition '+(i+1),b:el.textContent.trim().slice(0,140)}));
  (ch.quiz||[]).slice(0,6).forEach(q=>
    cards.push({f:q.q,b:q.c[q.a]+' — '+q.exp}));
  return cards.slice(0,14);
}

function buildFlash(ch,col){
  flashCards=getCards(ch); flashIdx=0;
  if(!flashCards.length) return '<p style="color:var(--muted)">Cartes à venir.</p>';
  return `<div class="fw">
  <div class="fcnt" id="fcnt">Carte 1 / ${flashCards.length} · Clique pour retourner</div>
  <div class="fcard" onclick="flipF()">
    <div class="fi" id="fi">
      <div class="ff front" style="border-color:var(--${col})">
        <span class="flbl" style="color:var(--${col});border-color:var(--${col}l);background:var(--${col}l)">❓ Question</span>
        <div class="ftxt" id="ffr">${flashCards[0].f}</div>
        <div class="fhint">Clique pour voir la réponse</div>
      </div>
      <div class="ff back" style="border-color:var(--cap)">
        <span class="flbl" style="color:var(--cap);border-color:var(--capl);background:var(--capl)">✅ Réponse</span>
        <div class="ftxt" id="fbk">${flashCards[0].b}</div>
      </div>
    </div>
  </div>
  <div class="fnav">
    <button class="fnb" onclick="prevF()">← Précédente</button>
    <button class="fnb" onclick="nextF()" style="border-color:var(--${col});color:var(--${col})">Suivante →</button>
    <button class="fnb" onclick="shuffleF()">🔀 Mélanger</button>
  </div></div>`;
}
function flipF(){document.getElementById('fi').classList.toggle('flip');}
function setF(i){
  const c=flashCards[i];
  document.getElementById('ffr').textContent=c.f;
  document.getElementById('fbk').textContent=c.b;
  document.getElementById('fi').classList.remove('flip');
  document.getElementById('fcnt').textContent=`Carte ${i+1} / ${flashCards.length} · Clique pour retourner`;
}
function nextF(){flashIdx=(flashIdx+1)%flashCards.length;setF(flashIdx);}
function prevF(){flashIdx=(flashIdx-1+flashCards.length)%flashCards.length;setF(flashIdx);}
function shuffleF(){flashCards=[...flashCards].sort(()=>Math.random()-.5);flashIdx=0;setF(0);}

// ── HOME ──
function updateHome(){
  let tc=0,te=0,tq=0;
  document.getElementById('lgrid').innerHTML='';
  const g=document.getElementById('lgrid');
  Object.entries(LVL).forEach(([k,lv])=>{
    tc+=lv.chapters.length;
    lv.chapters.forEach(ch=>{
      const d=document.createElement('div');d.innerHTML=ch.exos||'';
      te+=d.querySelectorAll('.ec').length;
      tq+=(ch.quiz||[]).length;
    });
    const done=lv.chapters.filter(ch=>visited[ch.id]).length;
    const pct=lv.chapters.length?Math.round(done/lv.chapters.length*100):0;
    g.innerHTML+=`
    <div class="lcard" onclick="showLevel('${k}')">
      <div class="lcard-top" style="background:var(--${lv.color})"></div>
      <div class="lcard-ico" style="background:var(--${lv.color}l)">${lv.icon}</div>
      <h2>${lv.label}</h2><p>${lv.sub}</p>
      <div class="lcard-meta">
        <span class="lcard-bdg" style="color:var(--${lv.color});border-color:var(--${lv.color})">${lv.chapters.length} chapitre${lv.chapters.length>1?'s':''}</span>
        <div class="lpw">
          <div class="lpbar"><div class="lpfill" style="width:${pct}%;background:var(--${lv.color})"></div></div>
          <div class="lptxt">${done}/${lv.chapters.length} consultés</div>
        </div>
      </div>
    </div>`;
  });
  document.getElementById('sn-c').textContent=tc;
  document.getElementById('sn-e').textContent=te;
  document.getElementById('sn-q').textContent=tq;
  document.getElementById('sn-v').textContent=Object.keys(visited).length;
}

// ── PROGRESSION ──
function showProg(){
  document.getElementById('pmc').innerHTML=
    Object.entries(LVL).map(([k,lv])=>{
      const done=lv.chapters.filter(ch=>visited[ch.id]).length;
      const pct=lv.chapters.length?Math.round(done/lv.chapters.length*100):0;
      return `<div class="pl">
        <h3 style="color:var(--${lv.color})">${lv.icon} ${lv.label}</h3>
        <div class="pbar"><div class="pbf" style="width:${pct}%;background:var(--${lv.color})"></div></div>
        <div class="pdet">${done}/${lv.chapters.length} chapitres — ${pct}%</div>
      </div>`;
    }).join('')
    +`<button class="rbtn" onclick="if(confirm('Réinitialiser ?')){visited={};save();updateHome();closeProg();}">🗑️ Réinitialiser</button>`;
  document.getElementById('pm').classList.add('open');
}
function closeProg(){document.getElementById('pm').classList.remove('open');}
document.getElementById('pm').onclick=e=>{if(e.target.id==='pm')closeProg();};

// ── RECHERCHE ──
const $si=document.getElementById('si'),$sr=document.getElementById('sr');
$si.addEventListener('input',()=>{
  const q=$si.value.trim().toLowerCase();
  if(!q){$sr.style.display='none';return;}
  const res=[];
  Object.entries(LVL).forEach(([k,lv])=>lv.chapters.forEach(ch=>{
    if(ch.title.toLowerCase().includes(q)||ch.desc.toLowerCase().includes(q))
      res.push({k,lv,ch});
  }));
  if(!res.length){$sr.style.display='none';return;}
  $sr.innerHTML=res.slice(0,8).map(r=>
    `<div class="sri" onclick="doSearch('${r.k}','${r.ch.id}')">
       <span class="sri-b" style="color:var(--${r.lv.color});background:var(--${r.lv.color}l)">${r.lv.label}</span>
       ${r.ch.title}
     </div>`).join('');
  $sr.style.display='block';
});
function doSearch(k,id){$sr.style.display='none';$si.value='';openChap(k,id);}
document.addEventListener('click',e=>{if(!document.getElementById('sw').contains(e.target))$sr.style.display='none';});
